<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM QueueHub - Select Service</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{
    min-height:100vh; display:flex; justify-content:center; align-items:center;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('background2.jpg') no-repeat center center/cover;
}
.container{
    width:90%; max-width:800px; background:rgba(255,255,255,0.15); backdrop-filter:blur(15px);
    padding:40px; border-radius:20px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
h1{ color:#d4f5d4; margin-bottom:10px; }
p{ color:#a8e6a3; margin-bottom:30px; }
.services{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; }
.service-btn{
    padding:15px; border:none; border-radius:15px; background:white; color:#333;
    font-size:15px; font-weight:500; cursor:pointer; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.service-btn:hover{ transform:translateY(-5px); background:#0f9b0f; color:white; }

/* 🆔 Highlight Styling for ID Appointment */
.id-appointment-btn { background: #e0f2fe; color: #0284c7; font-weight: 700; border: 1px dashed #0284c7; }
.id-appointment-btn:hover { background: #0284c7 !important; color: white !important; }

.other-btn{ background:#e2fcd2; color:#0f9b0f; font-weight:700; }
.back{
    display:inline-block; margin-top:25px; color:#a8e6a3; text-decoration:none;
    border:2px solid rgba(168,230,163,0.5); padding:10px 20px; border-radius:25px; transition:0.3s;
}
.back:hover{ background:rgba(168,230,163,0.2); }

/* 📱 Beautiful QR Modal Overlay Container */
.qr-modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
    display: none; justify-content: center; align-items: center; z-index: 9999;
}
.qr-modal-card {
    background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
    width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.qr-modal-card h2 { color: #333; font-size: 20px; margin-bottom: 5px; }
.qr-modal-card p { color: #666; font-size: 13px; margin-bottom: 8px; }

/* New Student Notice Badge */
.notice-badge {
    display: inline-block; background: #ef4444; color: white; font-weight: bold;
    font-size: 11px; padding: 4px 10px; border-radius: 20px; margin-bottom: 18px;
    letter-spacing: 0.5px; text-transform: uppercase;
}

.qr-image-display { width: 100%; max-width: 250px; height: auto; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
.qr-modal-close-btn { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
.qr-modal-close-btn:hover { background: #000; }

@keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="qr-modal-overlay" id="qrModal">
    <div class="qr-modal-card">
        <h2>🆔 ID Appointment QR</h2>
        <p>Scan the code below to schedule your ID verification.</p>
        <div class="notice-badge">⚠️ For New Students Only</div>
        
        <img src="IDA.jfif" alt="ID Appointment QR Code" class="qr-image-display" onerror="this.src='https://via.placeholder.com/250?text=Missing+IDA.jpeg'">
        
        <button class="qr-modal-close-btn" onclick="closeQrModal()">❌ Close Window</button>
    </div>
</div>

<div class="container">
    <h1>📋 Select Your Purpose</h1>
    <p>Please choose what you are here for</p>

    <div class="services">
        <button class="service-btn" onclick="selectPurpose('General Inquiry')">General Inquiry</button>
        <button class="service-btn" onclick="selectPurpose('Transcript of Records (TOR)')">Transcript of Records (TOR)</button>
        <button class="service-btn" onclick="selectPurpose('Form 137 / Form 138')">Form 137 / Form 138</button>
        <button class="service-btn" onclick="selectPurpose('Certificate of Enrollment (COE)')">Certificate of Enrollment (COE)</button>
        <button class="service-btn" onclick="selectPurpose('Honorable Dismissal / Transfer')">Honorable Dismissal / Transfer</button>
        <button class="service-btn" onclick="selectPurpose('Diploma Claims')">Diploma Claims</button>
        <button class="service-btn" onclick="selectPurpose('Adding / Dropping of Subjects')">Adding / Dropping of Subjects</button>
        <button class="service-btn" onclick="selectPurpose('Evaluation of Grades')">Evaluation of Grades</button>
        <button class="service-btn" onclick="selectPurpose('Graduation Clearance')">Graduation Clearance</button>
        <button class="service-btn" onclick="selectPurpose('Shifting / Course Revision')">Shifting / Course Revision</button>
        <button class="service-btn" onclick="selectPurpose('Certified True Copies')">Certified True Copies</button>
        
        <button class="service-btn id-appointment-btn" onclick="openQrModal()">🆔 ID Appointment (QR)</button>
        
        <button class="service-btn other-btn" onclick="selectCustomPurpose()">Others...</button>
    </div>

    <a href="registrar-home.html" class="back">← Back</a>
</div>

<script>
function selectPurpose(service) {
    localStorage.setItem("selectedStudentPurpose", service);
    window.location.href = "registrar-student.html";
}

function selectCustomPurpose() {
    const customService = prompt("Please enter your specific purpose:");
    if (customService === null) return; // User cancelled out
    
    const trimmed = customService.trim();
    if (trimmed === "") {
        alert("Purpose cannot be left empty.");
        return;
    }
    
    selectPurpose(trimmed);
}

function openQrModal() {
    document.getElementById("qrModal").style.display = "flex";
}

function closeQrModal() {
    document.getElementById("qrModal").style.display = "none";
}
</script>
</body>
</html>
