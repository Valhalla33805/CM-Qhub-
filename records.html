<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM QueueHub - Served Data Archives</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { min-height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('background2.jpg') no-repeat center center/cover; padding:30px; }
.container { width:100%; max-width:1200px; background:rgba(255,255,255,0.12); backdrop-filter:blur(15px); border-radius:25px; padding:40px; box-shadow:0 10px 40px rgba(0,0,0,0.4); color:white; }
h1 { color:#d4f5d4; text-align:center; margin-bottom:10px; }
.subtitle { text-align:center; color:#a8e6a3; margin-bottom:30px; font-size:18px; }
.counter-badge { background:rgba(255,215,0,0.2); border:1px solid #ffd700; color:#ffd700; padding:6px 15px; border-radius:15px; font-weight:bold; display:inline-block; margin-bottom:20px; }

/* 📂 DATE GROUP ACCORDION STYLES */
.date-group-container { max-height: 550px; overflow-y: auto; padding-right: 5px; }
.date-header-btn { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 15px 25px; text-align: left; color: #ffd700; font-size: 17px; font-weight: bold; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; transition: 0.3s; }
.date-header-btn:hover { background: rgba(255,255,255,0.15); transform: translateX(2px); }
.date-header-btn .item-count { background: #ffd700; color: #111; font-size: 12px; padding: 3px 10px; border-radius: 10px; font-weight: bold; }

.date-content-panel { display: none; background: rgba(0,0,0,0.3); border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.05); border-top: none; margin-top: -10px; margin-bottom: 15px; overflow-x: auto; animation: slideDown 0.2s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

table { width:100%; border-collapse:collapse; text-align:left; font-size:14px; }
th, td { padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.08); vertical-align: middle; }
th { background: #222926; color:#a8e6a3; font-weight:600; }
tr:hover { background:rgba(255,255,255,0.05); }

.status-badge { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:bold; display:inline-block; }
.status-completed { background:rgba(15,155,15,0.25); color:#a8e6a3; border:1px solid #0f9b0f; }
.status-cutoff { background:rgba(255,77,77,0.25); color:#ff8080; border:1px solid #ff4d4d; }
.action-row { display:flex; justify-content:space-between; align-items:center; margin-top:25px; flex-wrap:wrap; gap:15px;}
.clear-btn { background:#ff4d4d; color:white; border:none; padding:12px 24px; border-radius:10px; cursor:pointer; font-weight:500; transition:0.3s; }
.clear-btn:hover { background:#cc0000; transform:translateY(-2px); }
.back { color:#a8e6a3; text-decoration:none; border:2px solid rgba(168,230,163,0.5); padding:10px 24px; border-radius:25px; transition:0.3s; display:inline-block; }
.back:hover { background:rgba(168,230,163,0.2); }
.empty { text-align:center; color:#ccc; padding:40px; font-size:16px; }
</style>
</head>
<body>
<div class="container">
    <h1>📊 Served Data Archives Logs</h1>
    <div class="subtitle">Complete Transactional Record History Storage</div>
    
    <div class="counter-badge" id="totalCountBadge">Total Compiled Items: 0</div>

    <div class="date-group-container" id="archiveContainer">
        <div class="empty">Establishing live stream pipeline data sync...</div>
    </div>

    <div class="action-row">
        <button class="clear-btn" onclick="handleClearLog()">🗑️ Wipe Archive Logs Data</button>
        <a href="admin.html" class="back">✖ Close Archive Window</a>
    </div>
</div>

<script type="module" src="queue-system.js"></script>

<script>
function renderLogs(queue) {
    const archiveContainer = document.getElementById("archiveContainer");
    const countBadge = document.getElementById("totalCountBadge");
    const history = queue.logsHistory || [];

    countBadge.textContent = `Total Compiled Items: ${history.length}`;

    if (history.length === 0) {
        archiveContainer.innerHTML = `<div class="empty">No historic records saved inside active cluster yet. Completed files print out here.</div>`;
        return;
    }

    // ⚡ STEP 1: Group data logs by their unique calendar date string
    const groups = {};
    history.forEach(log => {
        const dateKey = log.date || "Unknown Date";
        if (!groups[dateKey]) groups[dateKey] = [];
        groups[dateKey].push(log);
    });

    // ⚡ STEP 2: Dynamically construct the nested collapsible folders HTML structure
    archiveContainer.innerHTML = "";
    Object.keys(groups).forEach((date, index) => {
        const dateLogs = groups[date];
        
        // Target structural elements matching key identification tokens
        const btnId = `btn-${index}`;
        const panelId = `panel-${index}`;

        let tableRowsHTML = "";
        dateLogs.forEach(log => {
            const isCompleted = log.status === "Completed";
            const badgeClass = isCompleted ? "status-completed" : "status-cutoff";
            
            tableRowsHTML += `
                <tr>
                    <td>🕒 ${log.timestamp || "N/A"}</td>
                    <td style="color:#ffd700; font-weight:bold;">${log.number}</td>
                    <td>${log.name || "Guest User"}</td>
                    <td>${log.userType || "Visitor"}</td>
                    <td>${log.purpose || "General Inquiry"}</td>
                    <td>Window ${log.window}</td>
                    <td>${log.timeTaken}</td>
                    <td><span class="status-badge ${badgeClass}">${log.status}</span></td>
                </tr>`;
        });

        archiveContainer.innerHTML += `
            <div class="date-wrapper-item">
                <button class="date-header-btn" onclick="toggleDatePanel('${panelId}')">
                    <span>📅 ${date}</span>
                    <span class="item-count">${dateLogs.length} Transactions</span>
                </button>
                <div class="date-content-panel" id="${panelId}">
                    <table>
                        <thead>
                            <tr>
                                <th>🕒 Timestamp</th>
                                <th>🎫 Ticket No.</th>
                                <th>👤 Name</th>
                                <th>🎓 User Classification</th>
                                <th>📌 Purpose of Visit</th>
                                <th>🪟 Terminal Window</th>
                                <th>⏳ Service Duration</th>
                                <th>⚡ Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRowsHTML}
                        </tbody>
                    </table>
                </div>
            </div>`;
    });
}

// 📂 COLLAPSIBLE DROPDOWN CONTROLLER TOGGLE
window.toggleDatePanel = function(panelId) {
    const panel = document.getElementById(panelId);
    const isOpen = panel.style.display === "block";
    
    // Close all open panels first for a clean interface look
    document.querySelectorAll('.date-content-panel').forEach(p => p.style.display = "none");
    
    // Toggle targeted panel state
    panel.style.display = isOpen ? "none" : "block";
};

window.handleClearLog = function() {
    if (!window.sysBackend) return;
    if (!confirm("Are you absolutely sure you want to permanently clear the archive database?")) return;
    
    window.sysBackend.queue.logsHistory = [];
    window.sysBackend.saveQueueToCloud();
};

const initHook = setInterval(() => {
    if (window.sysBackend) {
        window.sysBackend.listenToCloudUpdates((state) => {
            renderLogs(state);
        });
        clearInterval(initHook);
    }
}, 200);
</script>
</body>
</html>
